name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm test
      - name: Syntax check entrypoints
        run: |
          node --check server/index.js
          node --check server/manager.js
          node --check server/claudeSetup.js
          node --check server/gitReview.js
          node --check server/mcpReport.js
          node --check public/app.js
